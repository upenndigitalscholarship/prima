      ### A﻿ctivity 2.


      In her text, Porpora uses words like vagabonds (“vagabondi”) and gypsies (“zingare”). While these words might be considered offensive, she chooses to “reappropriate” this language to turn the words into positive terms. Do you know any other words that have been reappropriated? Speak with a partner about the use of offensive words and the power of their reappropriation in your own cultural context. (If necessary, reflect first, write notes, and check a dictionary before beginning the conversation).


      ### Activity 3. Reread the text and identify all verbs that use the subjunctive mood.


