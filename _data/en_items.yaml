  - title: Conditional Clauses
    description: >-
      ### Activity 1. Read the description of the film Il caso curioso di
      Benjamin Button.


      Tratto dal romanzo di Francis Scott Fitzgerald, Il caso curioso di Benjamin Button racconta le vicende2 di Benjamin Button (Brad Pitt), un neonato con la salute di un novantenne. Fin dai suoi primissimi giorni di vita si ritrova a convivere con artrite, cataratta e sordità.3 Nonostante i medici gli diano poco da vivere, più passa il tempo più ringiovanisce.4 La sua storia si intreccia5 con quella del suo primo e unico amore, Daisy (Cate Blanchett) una donna emancipata e libera. È proprio lei a narrare, in punto di morte, questa strana storia a sua figlia Caroline (Julia Ormond). David Fincher, a cui è stata affidata la regia, sceglie di iniziare la narrazione dalla modernità, per arrivare a raccontare di un passato migliore, fatto di speranze e sentimenti. (da https://www.cinematographe.it/)


      ### Reflection: Did you figure out what Benjamin’s “curious case” is? What happens to him? Here is the progression of his life:


      ![Older woman smiling](/assets/media/pixnio-230879-2857x1900.jpeg "Older Woman (photo thanks to Pixio)")


      L﻿a nascit


      ![Adult Woman in Pink Dress and White Hat](/assets/media/adult-woman-in-a-pink-blouse-and-a-hat.jpeg "Adult Woman (Photo Credit Michelle Smith)")


      L﻿'infanzia


      ![Young Black Man Smiling](/assets/media/pexels-nappy-936119.jpg "Young Black Man Smiling (credit Pexels)")


      La giovent


      ![White Boy in a Bed of Flowers](/assets/media/pexels-victoria-rain-16957383.jpg "White Boy and Flowers (credit Victoria Rain)")


      L﻿a media et


      ![Black Baby in Field](/assets/media/pexels-filipe-leme-2760338.jpg "Black baby in field (Credit Filipe Lama)")


      L﻿a vecchiaia


      ### Activity 2: Watch the videoclip and respond to the questions.


      1. Benjamin racconta ciò che è successo a Daisy. Dov’è lui all’inizio del clip?

      2. Che cosa avete capito dalla storia? Cosa succede a Daisy alla fine?I

      3. In questa storia, Benjamin usa spesso il trapassato e il congiuntivo trapassato. Perché sono indispensabili per raccontare la storia?


      ### Activity 3: Watch the videoclip again, paying attention to what each character does (la donna, il tassista, Daisy). Write your observations below.


      Daisy, the taxi driver, e the woman are characters that are part of this sequence. Write some phrases about their behavior and actions that contribute to this sequence of events.


      1. L﻿a donna\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\__

      2. I﻿l tassista\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\__

      3. D﻿aisy\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_


      Who else was part of this sequence? What did they do (or not do) to contribute to the end result?


      ### Activity 4: Here is the first part of the story. Underline each phrase that has two or more actions. Determine if the actions happen simulatenously happens before another or others.


      Una donna a Parigi stava uscendo a fare compere ma aveva dimenticato il soprabito e tornò in dietro a prenderlo. Mentre era lì squillò il telefono e lei rispose, parlò per un paio di minuti. Mentre la donna era al telefono, Daisy stava provando a uno spettacolo a L’Opéra di Paris. E mentre lei provava, la donna, finito di parlare al telefono, era uscita per prendere un taxi.


      Un tassista, poco prima, aveva scaricato un cliente e si era fermato a prendere un caffè. E intanto Daisy continuava a provare. E questo tassista che si era fermato per un caffè prese a bordo la donna che andava a fare compere e che aveva perso l’altro taxi. Il taxi dovette fermarsi per un uomo che stava andando a lavoro in ritardo di cinque minuti perché si era dimenticato di mettere la sveglia. Mentre quell’uomo nel ritardo attraversava la strada, Daisy aveva finito le prove e si stava facendo la doccia. E mentre Daisy si faceva la doccia, il taxi aspettava la donna che era entrata in una pasticceria a ritirare un pacchetto che, però, non era pronto perché la commessa si era lasciata col fidanzato la sera prima e se n’era dimenticata. Ritirato il pacchetto, la donna era rientrata nel taxi che rimase bloccato da un furgone.


      Intanto Daisy si stava vestendo. Il furgone si spostò e il taxi poté ripartire. Mentre Daisy, ultima a vestirsi, si fermò ad aspettare un’amica la quale si era rotta un laccio. Mentre il taxi era fermo a un semaforo, Daisy e la sua amica uscirono dal retro del teatro.


      ### Activity 5: Here is the second part of the story. Conjugate the verbs using the conditional past and the past perfect, following the logic of the story. Pay attention to the agreement!


      E﻿xample: Se il pacchetto alla pasticceria \_\_\_\_\_\__fosse stato\_\_\_\_\_\_ (essere) pronto, la donna non lo \_\_\_\_\_\_\_\_\_avrebbe aspettato\_\_\_\_\_\_\_ (aspettare).


      Se solo una cosa \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (andare) diversamente, se quel laccio non \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_, (rompersi) se quel furgone \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_(spostarsi) un momento prima, o se quel pacchetto \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (essere) pronto perché la commessa non si era lasciata col fidanzato, o quell’uomo \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (mettere) la sveglia e \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_(alzarsi) cinque minuti prima, o se quel tassista non \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_(fermarsi) a prendere il caffè, o se quella donna \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_(ricordarsi) del soprabito e \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_(prendere) un taxi prima, Daisy e la sua amica \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (attraversare) la strada e il taxi \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\__(sfilare) via.
