      There are also several indirect object pronouns in the dialogue (mi, ti, gli, le, ci, vi, gli).\

      List the sentences with indirect object pronouns and then rewrite them so you don’t have to use a pronoun. (es. Mi pare... che sta un po’ meglio. Pare a me che sta un po’ meglio.)


