      ### Activity 5


      P﻿orpora writes:


      “Se mi fossi dovuto attenere alle regole dello scrivere... non avrei potuto riportare la testimonianza di un periodo molto importante della storia Lgbt.”\

      e\

      “Se avessi potuto lo avrei raccontato in versi”


      What kind of statements are they? How are these sentences formed?


      \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_


      ### Activity 6. Write the correct form to create some sentences using the hypothetical period of possibility and impossibility. Don’t forget the agreement when it is necessary!


      1. Se gli/le attivisti/e/* non \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (manifestare) durante quell’epoca, gli avanzamenti dei diritti della comunità LGBTQIA+ \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\____ (essere) molto più lenti.

      2. Se uno \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (leggere) il libro Antologaia, \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (capire) di più l’argomento e la storia del movimento in Italia.

      3. Se Porpora \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (venire) negli Stati Uniti, (lei) \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\____ (potere) presentare il libro agli studenti.

      4. Se tutti/e/\* noi \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (cercare) di capire gli/le/altri/e/\*, (noi) \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ (conoscere) meglio le persone.


      ### Activity 7. The conditional clause (impossibility): it is used to describe impossible, past events because other things happened and we cannot go back and change our pasts... however, we can always imagine what might have been.


      Think of a moment in which you were involved in something important or something meaningful you took part in. Mimicking the tone and energy of the paragraph written by Porpora Marcasiano, describe what the event was like and how the outcome could have changed if things had been done differently of if you had done something differently.
