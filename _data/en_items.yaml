items:
  - title: Il periodo ipotetico – l’impossibilità
    description: "Activity 1. Read the description of the film Il caso curioso di
      Benjamin Button.1 Tratto dal romanzo di Francis Scott Fitzgerald, Il caso
      curioso di Benjamin Button racconta le vicende2 di Benjamin Button (Brad
      Pitt), un neonato con la salute di un novantenne. Fin dai suoi primissimi
      giorni di vita si ritrova a convivere con artrite, cataratta e sordità.3
      Nonostante i medici gli diano poco da vivere, più passa il tempo più
      ringiovanisce.4 La sua storia si intreccia5 con quella del suo primo e
      unico amore, Daisy (Cate Blanchett) una donna emancipata e libera. È
      proprio lei a narrare, in punto di morte, questa strana storia a sua
      figlia Caroline (Julia Ormond). David Fincher, a cui è stata affidata la
      regia, sceglie di iniziare la narrazione dalla modernità, per arrivare a
      raccontare di un passato migliore, fatto di speranze e sentimenti. "
    lesson: Il caso curioso di Benjamin Button
    doc_file: /assets/media/benjamin_button_periodo_ipotetico-eng-.docx
