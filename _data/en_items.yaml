      ### A﻿ctivity 3-1. Listen to the song and fill in the spaces with the words you hear. 


      **“Ciao Ciao”** 


      Come stai bambina? 


      Dove vai stasera? Che paura intorno 


      È la fine del mondo 


      Sopra la rovina sono una regina 


      Ma-ma-ma 


      Ma non so cosa salvare 


      Sono a pezzi, già mi manchi 


      Occhi dolci, cuori infranti 


      Che spavento, come il vento 


      Questa terra sparirà 


      Nel silenzio della crisi generale 


      Ti saluto con amore 


      Con le \_\_\_\_\_\_\_\_\_\_\_\_ (x3) 


      Ciao ciao 


      Con i \_\_\_\_\_\_\_\_\_\_\_\__ (x3) 


      Ciao ciao 


      E con la\_\_\_\_\_\_\_\_\_\_\_\_\_\_ 


      con il \_\_\_\_\_\_\_\_\_\_\_\_\_\__ 


      con il \_\_\_\_\_\_\_\_\_\_\_\_\_\__ 


      Ciao ciao 


      E con le \_\_\_\_\_\_\_\_\_\_\_\_\_\_ 


      con il \_\_\_\_\_\_\_\_\_\_\_\_\_\__


      coi miei \_\_\_\_\_\_\_\_\_\_\_\_\_\_ 


      Ciao (ciao, ciao, ciao, ciao, ciao, ciao, ciao) 


      Questa è l'ora della fine 


      Romperemo tutte le vetrine 


      Tocca a noi, non lo senti, come un'onda arriverà 


      Me lo sento esploderà, esploderà 


      La fine del mondo è una giostra perfetta 


      Mi scoppia nel cuore la voglia di festa 


      La fine del mondo, che dolce disdetta 


      Mi vien da star male, mi scoppia la testa 


      Con le \_\_\_\_\_\_\_\_\_\_\_\_\_\__ (x3) 


      Ciao ciao 


      E con i \_\_\_\_\_\_\_\_\_\_\_\_\_\_ (x3) 


      Ciao ciao 


      E con le \_\_\_\_\_\_\_\_\_\_\_\_\_\_, 


      con il \_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_, 


      coi miei \_\_\_\_\_\_\_\_\_\_\_\_\_\__ 


      Ciao ciao 


      E con la\_\_\_\_\_\_\_\_\_\_\_\_\_\__, 


      con il \_\_\_\_\_\_\_\_\_\_\_\_\_\__, 


      con il \_\_\_\_\_\_\_\_\_\_\_\_\_\__


      ### A﻿ctivity 3-2. Mark all the body parts mentioned in the song. 


