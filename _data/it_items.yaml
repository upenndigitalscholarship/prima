  - title: Pronomi (riflessivi, diretti, indiretti)
    description: >-
      ### Attività 1. Questa è una conversazione tra quattro persone.
      Ascoltatela e riempite gli spazi con i pronomi giusti (possono essere
      pronomi di oggetto diretto, di oggetto indiretto, pronomi riflessivi, o
      pronomi combinati).


      \

      Maria: Sì, \_\_\_\_\_\_\_\__ aveva detto che \_\_\_\_\_aveva visto con una bella macchina. Come mai sei tornata, Chiara? È da un po’ che non \_\_\_\_\____ vedeva, eh? 


      Chiara: Eh... è solo un saluto. Volevo vedere mamma. 


      Commessa: Allora \_\_\_\__trattieni un po’, Chiara?


      Chiara: Eh, no. Purtroppo devo partire subito.


      Commessa: Quest’anima di viaggio e già riparti? Ma così non saluti nessuno, però.


      Maria: Però! \_\_\_\_\_\_ hai fatta di spesa. Ma che \_\_\_\_\_\_\_\_\_\_ porti fino a Roma?


      Alfredo: Maria, lasciate___ andare a Chiara che va di fretta, eh?


      Commessa: È non \_\_\_\_\_ vediamo mai, qualche domanda \_\_\_\_\_\_\_\_\_\_\_\_\_ possiamo pur fare, no? 


      Chiara: È che vado proprio di fretta. Quanto \_\_\_\__ devo?


      Commessa: €37.50. Saluta\_\_\_\_ tua sorella e anche tua madre. \_\_\_\_ pare che comunque con quel disturbo che ha... sta un po’ meglio, eh?


      Maria: Quelli sono gli stravizi di gioventù. Mica \_\_\_\_ offendi, Chiara? Però, tua madre \_\_\_\__ ha combinate tante e pure tua sorella, mica scherza.


      Commessa: E già. Tu sei diversa però, Chiara. Hai fatto bene ad andare via, fare carriera nella capitale.


      Chiara: Ecco, però adesso devo proprio scappare. Grazie, arrivederci! 


      Commessa: Ciao, Chiara, ciao.


      Alfredo: Ma dovevi proprio dir\_\_\_\_\_\_\_\_\_\_\_\_, eh?


      Commessa: Perché? Non è vero che quelle sono due zoccole, Alfrè?


      ### Attività 2: Gli usi dei pronomi riflessivi. Rispondete alle domande per praticare i pronomi riflessivi.


      1. Nel dialogo dicono  “ti trattieni” dal verbo “trattenersi.” Quali sono gli altri verbi riflessivi nel dialogo? 

      2. Quali sono gli altri verbi riflessivi che conoscete? 

      3. Elencate i pronomi riflessivi che ricordate. 

      4. Perché usiamo i pronomi riflessivi? 


      ### Attività 3: Il significato dei pronomi di oggetto diretto. Seguite le indicazioni qui sotto per praticare.


      Nel dialogo usano pronomi di oggetto diretto come nell'esempio "non la vediamo mai." In questo caso il pronome sostituisce il nome Chiara. Scrivete tre altre frasi che hanno pronomi diretti nel dialogo, poi riscrivetele usando l'oggetto che è stato sostituito dal pronome. (es. Non la vediamo mai. Non vediamo Chiara mai.) 


      1. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_

      2. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_

      3. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_


      ### Attività 4: Il significato dei pronomi di oggetto indiretto. Seguite le indicazioni qui sotto per praticare.


      Ci sono alcuni pronomi di oggetto indiretto nel dialogo (mi, ti, gli, le, ci, vi, gli). Elencate le frasi con pronomi di oggetto indiretto e poi riscrivetele in modo che non venga usato il pronome. \
       (es. Mi pare... che sta un po’ meglio. Pare a me che sta un po’ meglio.)

      1. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_

      2. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_

       Qual è la differenza tra un oggetto diretto e un oggetto indiretto? 

      ### Attività 5: Pronomi combinati. A volte i pronomi diretti e quelli indiretti si combinano. Seguite le istruzioni qui sotto per praticare.


      Guardate il dialogo e scrivete gli esempi di pronomi combinati che vedete. Poi riscrivete le frasi, prima sostituendo per l'oggetto diretto e poi per l'oggetto indiretto come nell'esempio. 


      (es: “ma che te la porti fino a Roma” a. ma che ti porti la spesa fino a Roma. B. ma che la porti con te fino a Roma.)


