      ### Attività 7. Il periodo ipotetico dell’irrealtà: si usa per esprimere eventi non possibili perché sono successe altre cose e non possiamo tornare indietro e cambiare il nostro passato... ma possiamo sempre immaginare come sarebbe potuto essere.


