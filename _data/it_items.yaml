    lezione: La mia casa è dove sono (testo)
  - description: >-
      ### Attività 1. Scrittura: Cosa dici a una persona che… Usando
      l’imperativo informale, di’ a queste persone cosa fare.


      1. Il tuo amico deve preparare una cena per il suo capo di lavoro. 

         _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_
      2. La tua vicina di casa ascolta musica fino alle 2 di mattina ogni notte. 

         _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_
      3. Tuo fratello ha una partita di basket importante domani sera. 

         _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_
      4. La tua compagna di classe ha mal di gola.

         _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_
      5. Tuo/tua/tu\* zio/zia/zi\* non sa dove ha parcheggiato la macchina. 

        _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\__

      ### Attività 2. Simone Dice: gioca a “Simone dice” con il tuo gruppo, la tua classe, o il/la tu* partner. La persona davanti al gruppo dà ordini usando l’imperativo informale e il vocabolario per le parti del corpo. Esempi: Simone dice, fa’ così con il piede. Simone dice, va’ giù con la testa. Simone dice, di’ “basta” con la bocca. Simone dice, da’ cinque con la mano.


      Scrivi alcuni esempi per iniziare: 


      1. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_

      2. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_

      3. _﻿\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_


      ### Attività 3-1. Ascolta la canzone e riempi gli spazi.


      “Ciao Ciao” 


      Come stai bambina? 


      Dove vai stasera? Che paura intorno 


      È la fine del mondo 


      Sopra la rovina sono una regina 


      Ma-ma-ma 


      Ma non so cosa salvare 


      Sono a pezzi, già mi manchi 


      Occhi dolci, cuori infranti 


      Che spavento, come il vento 


      Questa terra sparirà 


      Nel silenzio della crisi generale 


      Ti saluto con amore 


      Con le \_\_\_\_\_\_\_\_\_\_\_\_ (x3) 


      Ciao ciao 


      Con i \_\_\_\_\_\_\_\_\_\_\_\__ (x3) 


